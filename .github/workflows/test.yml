name: test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Read pinned AL LS version
        id: al-version
        run: |
          version=$(node -p "require('./package.json').alLanguageServer.version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Pinned AL LS version: $version"

      # Two-tier cache: the raw ~40MB gzipped VSIX in one bucket, the
      # extracted ~190MB bin/ tree in another. Extraction is fast enough that
      # we could recompute it, but caching both lets a contributor land a
      # config change without re-downloading.
      - name: Cache AL LS install
        uses: actions/cache@v4
        id: al-ls-cache
        with:
          path: tests/.al-ls
          key: al-ls-${{ runner.os }}-${{ steps.al-version.outputs.version }}

      - name: Install dependencies
        run: npm ci

      - name: Install AL language server
        run: npm run install:al-ls

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Run e2e tests
        run: npm run test:e2e

      # Surface the LS log on failure — analyzer load errors (`AD0001`) have
      # most of their detail there, not in the assertion text.
      - name: Upload AL LS log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: al-ls-log
          path: |
            tests/.al-ls/**/bin/linux/EditorServices.log
          if-no-files-found: ignore
